<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>2026 서울국제도서전</title>
<style>*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:#f2efea;font-family:-apple-system,"Helvetica Neue",sans-serif;overflow:hidden}
:root{--red:#fe3939}
#app{display:flex;flex-direction:column;height:100vh;height:100dvh;max-width:430px;margin:0 auto;background:#f2efea}
.hdr{background:#fff;border-bottom:.5px solid #ddd;padding:max(env(safe-area-inset-top),10px) 12px 0;flex-shrink:0;z-index:60}
.htitle{font-size:15px;font-weight:700;color:#111;letter-spacing:-.3px}
.hsub{font-size:10px;color:#999;margin-top:1px}
.tabs{display:flex;gap:3px;background:#f2efea;border-radius:8px;padding:3px;margin:8px 0}
.tab{flex:1;padding:7px 0;font-size:12px;font-weight:600;border:none;border-radius:6px;cursor:pointer;color:#999;background:transparent}
.tab.on{background:#fff;color:#111;box-shadow:0 1px 3px rgba(0,0,0,.1)}
.view{display:none;flex:1;overflow:hidden;flex-direction:column;min-height:0}
.view.on{display:flex}
.filter-bar{flex-shrink:0;background:#fff;border-bottom:.5px solid #eee;padding:8px 12px 6px}
.hall-btns{display:flex;gap:5px;margin-bottom:7px}
.hbtn{padding:5px 12px;border-radius:20px;font-size:11px;font-weight:600;border:.5px solid #ddd;background:#f8f8f6;color:#666;cursor:pointer;transition:all .12s}
.hbtn-on{background:#111;color:#fff;border-color:#111}
.search-box{position:relative;margin-bottom:7px}
.search-box input{width:100%;padding:7px 10px 7px 30px;border:.5px solid #ddd;border-radius:8px;font-size:12px;background:#f8f8f6;color:#111;outline:none}
.search-box input:focus{border-color:#999;background:#fff}
.sicon{position:absolute;left:9px;top:50%;transform:translateY(-50%);font-size:12px;color:#bbb}
.facet-scroll{overflow-y:auto;max-height:90px;-webkit-overflow-scrolling:touch}
.facet-scroll::-webkit-scrollbar{width:3px}
.facet-scroll::-webkit-scrollbar-thumb{background:#e0e0e0;border-radius:2px}
#facet-list{display:flex;flex-wrap:wrap;gap:5px;padding:2px 0 4px}
.ftag{padding:4px 10px;border-radius:14px;font-size:11px;border:.5px solid #ddd;background:#f5f5f2;color:#555;cursor:pointer;white-space:nowrap;transition:all .12s;font-weight:500}
.ftag:active{transform:scale(.95)}
.ftag-on{background:#fe3939;color:#fff;border-color:#fe3939;font-weight:700}
.mapvp-wrap{flex:1;overflow:hidden;position:relative;min-height:0}
#mapvp{width:100%;height:100%;overflow:hidden;cursor:grab;user-select:none;-webkit-user-select:none;touch-action:none}
#mapinner{transform-origin:0 0;will-change:transform}
.mapleg{display:flex;gap:6px;flex-wrap:wrap;padding:4px 10px 5px;border-top:.5px solid #eee;background:#fafaf8;flex-shrink:0}
.li{display:flex;align-items:center;gap:3px;font-size:9px;color:#999}
.ld{width:8px;height:8px;border-radius:2px;flex-shrink:0}
.zbtns{position:absolute;right:8px;bottom:8px;display:flex;flex-direction:column;gap:4px;z-index:10}
.zbtn{width:34px;height:34px;background:rgba(255,255,255,.95);border:.5px solid #ddd;border-radius:8px;font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 1px 4px rgba(0,0,0,.12);color:#333}
.rv{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.ecard{background:#fff;border-radius:10px;border:.5px solid #ddd;padding:12px;margin:10px 12px 0}
.elbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#999;margin-bottom:7px}
.eopts{display:flex;gap:8px}
.eopt{flex:1;border-radius:8px;padding:8px 10px;border:.5px solid #ddd;text-align:center}
.eopt.best{border-color:#f59e0b;background:#fffbeb}
.eol{font-size:9px;color:#999;text-transform:uppercase;letter-spacing:.3px;display:block}
.eon{font-size:12px;font-weight:700;color:#111;display:block;margin-top:2px}
.eopt.best .eon{color:#92400e}
.ebadge{font-size:8px;background:#fef3cd;color:#b45309;padding:2px 6px;border-radius:4px;display:inline-block;margin-top:3px;font-weight:700}
.ereason{font-size:10px;color:#bbb;margin-top:6px;line-height:1.5}
.rmwrap{margin:10px 0 0;background:#fff;border-bottom:.5px solid #eee;overflow:hidden}
.rmhd{font-size:10px;font-weight:600;color:#555;padding:8px 12px;border-bottom:.5px solid #eee;display:flex;justify-content:space-between;align-items:center}
.rmhd span{font-size:9px;color:#bbb;font-weight:400}
.rmcan{overflow-x:auto;-webkit-overflow-scrolling:touch;background:#f2efea;line-height:0}
.pnote{background:rgba(254,57,57,.06);border:.5px solid rgba(254,57,57,.2);border-radius:8px;padding:10px 12px;margin:10px 12px 0;font-size:11px;color:#c0392b;line-height:1.5}
.mhint2{font-size:10px;color:#ccc;margin:6px 12px}
.rlist{margin:8px 12px;display:flex;flex-direction:column;gap:5px}
.rcard{background:#fff;border-radius:10px;border:.5px solid #ddd;padding:11px 12px;display:flex;align-items:center;gap:10px;cursor:pointer}
.rcard:active{transform:scale(.98)}
.rord{width:28px;height:28px;border-radius:50%;background:var(--red);color:#fff;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.rbody{flex:1;min-width:0}
.rnum{font-size:10px;color:var(--red);font-weight:700}
.rname{font-size:13px;font-weight:600;color:#111;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rsub{font-size:10px;color:#999;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rdel{padding:4px 8px;color:#ccc;font-size:18px;cursor:pointer;flex-shrink:0}
.rempty{text-align:center;padding:60px 16px;color:#bbb;font-size:13px;line-height:1.8}
.ract{display:flex;gap:8px;margin:10px 12px 0}
.rbtn{flex:1;padding:11px;border-radius:10px;font-size:13px;font-weight:700;border:none;cursor:pointer}
.rbtn-p{background:var(--red);color:#fff}
.rbtn-g{background:#fff;color:#111;border:.5px solid #ddd}
.saved-wrap{margin:10px 12px;padding-bottom:max(env(safe-area-inset-bottom),14px)}
.saved-hd{font-size:10px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.5px;margin-bottom:7px;display:flex;align-items:center;justify-content:space-between}
.saved-hd span{font-size:10px;color:#bbb;font-weight:400;letter-spacing:0;text-transform:none}
.saved-item{display:flex;align-items:center;gap:6px;background:#fff;border:.5px solid #ddd;border-radius:9px;padding:9px 12px;margin-bottom:5px}
.saved-name{flex:1;text-align:left;background:none;border:none;font-size:12px;font-weight:600;color:#111;cursor:pointer;padding:0;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.saved-del{padding:3px 7px;background:none;border:.5px solid #eee;border-radius:6px;font-size:12px;color:#ccc;cursor:pointer}
.bbar{background:#fff;border-top:.5px solid #ddd;padding:8px 14px;padding-bottom:max(env(safe-area-inset-bottom),12px);display:flex;align-items:center;justify-content:space-between;gap:8px;flex-shrink:0}
.bcnt{font-size:12px;color:#999}.bcnt b{color:var(--red)}
.bgo{background:var(--red);color:#fff;border:none;border-radius:9px;padding:10px 18px;font-size:13px;font-weight:700;cursor:pointer}
.bgo:disabled{background:#e0ddd6;color:#bbb;cursor:default}
.toast{position:fixed;bottom:86px;left:50%;transform:translateX(-50%) translateY(10px);background:#222;color:#fff;padding:8px 18px;border-radius:22px;font-size:12px;opacity:0;transition:all .22s;z-index:200;white-space:nowrap;pointer-events:none}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
.ent-single{font-size:15px;font-weight:700;color:#111;padding:6px 0 4px;display:block}
.ecard .elbl{margin-bottom:4px}
.rmcan{touch-action:pan-x pan-y;overflow:auto;-webkit-overflow-scrolling:touch;background:#f2efea;line-height:0}
.rmwrap{margin:0;border-radius:0;border-left:none;border-right:none}
</style>
</head>

    }
    /* key → x,y 역산 */
    ck=Number(ck);
    cur_x=ck%GW; cur_y=Math.floor(ck/GW);
    if(cur_x===ex && cur_y===ey){
      /* 경로 복원: key에서 역산 */
      var path=[],pk=ck;
      while(par[pk]!==undefined){
        var px2=pk%GW, py2=Math.floor(pk/GW);
        path.unshift({x:px2,y:py2});
        pk=par[pk];
      }
      path.unshift({x:sx,y:sy});
      return path;
    }
    delete open[ck]; closed[ck]=1;
    for(di=0;di<4;di++){
      dx=D[di][0]; dy=D[di][1];
      nx=cur_x+dx; ny=cur_y+dy;
      if(nx<0||nx>=GW||ny<0||ny>=GH) continue;
      nk=ny*GW+nx;
      if(closed[nk]||g[nk]===1) continue;
      /* 역방향 패널티 */
      var stepCost=1;
      if(par[ck]!==undefined){
        var prevK=Number(par[ck]);
        var prevX=prevK%GW,prevY=Math.floor(prevK/GW);
        var pdx=cur_x-prevX,pdy=cur_y-prevY;
        if(pdx===-dx&&pdy===-dy) stepCost=8;
      }
      ng=(gs[ck]!==undefined?gs[ck]:INF)+stepCost;
      if(ng<(gs[nk]!==undefined?gs[nk]:INF)){
        par[nk]=ck; gs[nk]=ng;
        fs[nk]=ng+Math.abs(nx-ex)+Math.abs(ny-ey);
        open[nk]=1;
      }
    }
  }
  return null;
}

/* 부스 가장자리 바깥 자유셀 찾기 */
function findFreeCell(b){
  var g=getGrid();
  var bx0=Math.floor(b.x/GS), by0=Math.floor(b.y/GS);
  var bx1=Math.ceil((b.x+b.w)/GS), by1=Math.ceil((b.y+b.h)/GS);
  var cx=Math.round((bx0+bx1)/2);
  /* 아래쪽부터 탐색 */
  for(var r=0;r<=50;r++){
    /* 하단 */
    var ny=by1+r;
    if(ny<GH){
      for(var dx=-r;dx<=r;dx++){
        var nx=cx+dx;
        if(nx>=0&&nx<GW&&g[ny*GW+nx]===0) return {gx:nx,gy:ny};
      }
    }
    /* 상단 */
    ny=by0-r;
    if(ny>=0){
      for(var dx2=-r;dx2<=r;dx2++){
        var nx2=cx+dx2;
        if(nx2>=0&&nx2<GW&&g[ny*GW+nx2]===0) return {gx:nx2,gy:ny};
      }
    }
  }
  return {gx:cx,gy:by1+1};
}

/* 경로 점열 단순화 (Ramer-Douglas-Peucker) */
function simplifyPath(pts,eps){
  if(!pts||pts.length<3) return pts;
  var dmax=0,idx=0;
  var n=pts.length;
  var ax=pts[0].x,ay=pts[0].y,bx=pts[n-1].x,by=pts[n-1].y;
  var len=Math.sqrt((bx-ax)*(bx-ax)+(by-ay)*(by-ay));
  for(var i=1;i<n-1;i++){
    var d;
    if(len===0){d=Math.sqrt((pts[i].x-ax)*(pts[i].x-ax)+(pts[i].y-ay)*(pts[i].y-ay));}
    else{d=Math.abs((by-ay)*pts[i].x-(bx-ax)*pts[i].y+bx*ay-by*ax)/len;}
    if(d>dmax){dmax=d;idx=i;}
  }
  if(dmax>eps){
    var r1=simplifyPath(pts.slice(0,idx+1),eps);
    var r2=simplifyPath(pts.slice(idx),eps);
    return r1.slice(0,-1).concat(r2);
  }
  return [pts[0],pts[n-1]];
}

function pathToSVGD(path){
  if(!path||path.length<2) return null;
  var pts=[];
  for(var i=0;i<path.length;i++) pts.push({x:path[i].x*GS,y:path[i].y*GS});
  var simplified=simplifyPath(pts,1.5);
  if(!simplified||simplified.length<2) return null;
  var d="M"+simplified[0].x+","+simplified[0].y;
  for(var j=1;j<simplified.length;j++) d+=" L"+simplified[j].x+","+simplified[j].y;
  return d;
}

/* ── MAP PAN/ZOOM ── */
var panX=0,panY=0,currentScale=1;
var isDragging=false,dragStartX=0,dragStartY=0,dragPanX=0,dragPanY=0;
var pinchDist0=0,pinchScale0=1,pinchMidX=0,pinchMidY=0;

function applyTransform(){
  var el=document.getElementById("mapinner");
  if(el) el.style.transform="translate("+panX+"px,"+panY+"px) scale("+currentScale+")";
}
function clampPan(){
  var vp=document.getElementById("mapvp");if(!vp)return;
  var minX=Math.min(0,vp.clientWidth-SW*currentScale);
  var minY=Math.min(0,vp.clientHeight-SH*currentScale);
  panX=Math.min(0,Math.max(minX,panX));
  panY=Math.min(0,Math.max(minY,panY));
}
function fitMap(){
  var vp=document.getElementById("mapvp");if(!vp)return;
  var s=Math.min(vp.clientWidth/SW,vp.clientHeight/SH)*0.98;
  currentScale=s;
  panX=(vp.clientWidth-SW*s)/2;
  panY=(vp.clientHeight-SH*s)/2;
  applyTransform();
}
function zoomAt(cx,cy,factor){
  var ns=Math.max(0.2,Math.min(8,currentScale*factor));
  panX=cx-(cx-panX)*(ns/currentScale);
  panY=cy-(cy-panY)*(ns/currentScale);
  currentScale=ns;clampPan();applyTransform();
}

function initPanZoom(){
  var vp=document.getElementById("mapvp");if(!vp)return;
  vp.addEventListener("mousedown",function(e){
    isDragging=true;dragStartX=e.clientX;dragStartY=e.clientY;
    dragPanX=panX;dragPanY=panY;vp.style.cursor="grabbing";e.preventDefault();
  });
  window.addEventListener("mousemove",function(e){
    if(!isDragging)return;
    panX=dragPanX+(e.clientX-dragStartX);panY=dragPanY+(e.clientY-dragStartY);
    clampPan();applyTransform();
  });
  window.addEventListener("mouseup",function(){isDragging=false;vp.style.cursor="grab";});
  vp.addEventListener("wheel",function(e){
    e.preventDefault();
    var r=vp.getBoundingClientRect();
    zoomAt(e.clientX-r.left,e.clientY-r.top,e.deltaY<0?1.1:0.9);
  },{passive:false});
  var t0=null;
  vp.addEventListener("touchstart",function(e){
    if(e.touches.length===1){
      isDragging=true;
      dragStartX=e.touches[0].clientX;dragStartY=e.touches[0].clientY;
      dragPanX=panX;dragPanY=panY;
      t0={x:e.touches[0].clientX,y:e.touches[0].clientY};
    } else if(e.touches.length===2){
      isDragging=false;
      pinchDist0=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
      pinchScale0=currentScale;
      var r=vp.getBoundingClientRect();
      pinchMidX=(e.touches[0].clientX+e.touches[1].clientX)/2-r.left;
      pinchMidY=(e.touches[0].clientY+e.touches[1].clientY)/2-r.top;
    }
  },{passive:true});
  vp.addEventListener("touchmove",function(e){
    e.preventDefault();
    if(e.touches.length===1&&isDragging){
      panX=dragPanX+(e.touches[0].clientX-dragStartX);
      panY=dragPanY+(e.touches[0].clientY-dragStartY);
      clampPan();applyTransform();
    } else if(e.touches.length===2){
      var dist=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
      var ns=Math.max(0.2,Math.min(8,pinchScale0*(dist/pinchDist0)));
      panX=pinchMidX-(pinchMidX-panX)*(ns/currentScale);
      panY=pinchMidY-(pinchMidY-panY)*(ns/currentScale);
      currentScale=ns;clampPan();applyTransform();
    }
  },{passive:false});
  vp.addEventListener("touchend",function(e){if(e.touches.length===0)isDragging=false;},{passive:true});
}

      var DUR=2.2;

      /* 두 요소 동시에 애니메이션 */
      [pathEl,bgEl].forEach(function(el){
        if(!el) return;
        el.setAttribute("visibility","visible");
        el.style.strokeDasharray=len+" "+len;
        el.style.strokeDashoffset=String(len);
        el.style.transition="none";
        void el.getBoundingClientRect();
        el.style.transition="stroke-dashoffset "+DUR+"s cubic-bezier(0.25,0.46,0.45,0.94)";
        el.style.strokeDashoffset="0";
      });

      /* 선 완료 후: 화살표 페이드인 → 다음 구간 */
      var lineDoneMs=Math.round(DUR*1000);
      setTimeout(function(){
        if(arrEl){
          arrEl.style.transition="opacity 0.35s ease-out";
          arrEl.style.opacity="1";
        }
        /* 화살표 등장 후 0.6초 쉬고 다음 구간 */
        setTimeout(function(){drawSeg(idx+1);},600);
      }, lineDoneMs);
    }

    /* 첫 구간 시작 전 0.5초 여유 */
    setTimeout(function(){drawSeg(0);},500);
  },120);
}

/* ── ROUTE VIEW ── */
function renderRoute(){
  var rv=document.getElementById("rv");
  if(!SEL.length){
    rv.innerHTML="<div class=\"rempty\">\uD83D\uDDFA\uFE0F<br><br>[지도]탭의 패싯에서 방문 예정 부스를 탭하면<br>\uB3D9\uC120\uC5D0 \uCD94\uAC00\uB429\uB2C8\uB2E4.</div>";
    return;
  }
  var isB=SEL[0].charAt(0)==="B";
  var rec=isB?"B1\uD648 \uC785\uAD6C/\uCD9C\uAD6C":"A\uD648 \uC785\uAD6C";
  var alt=isB?"A\uD648 \uC785\uAD6C":"B1\uD648 \uC785\uAD6C/\uCD9C\uAD6C";
  h="<div class=\"ecard\"><div class=\"elbl\">\uCD94\uCC9C \uC785\uAD6C</div>";
  h+="<div class=\"ent-single\">"+rec+"</div>";
  h+="<div class=\"ereason\">\uCCAB \uBC29\uBB38 \uBD80\uC2A4("+SEL[0]+")\uAC00 "+(isB?"B1\uD648":"A\uD648")+"\uC5D0 \uC788\uC2B5\uB2C8\uB2E4.</div></div>";
  h+="<div class=\"rmwrap\"><div class=\"rmhd\">경로 지도</div><div id=\"rmcan\" class=\"rmcan\"></div></div>";
  h+="<div class=\"pnote\">\uC120\uD0DD \uC21C\uC11C\uB300\uB85C \uBC29\uBB38\u2022 \uCE74\uB4DC \uD0ED \u2192 \uC21C\uC11C \uC55E\uC73C\uB85C</div>";
  h+="<div class=\"rlist\">";
  for(var i=0;i<SEL.length;i++){
    var b=BMAP[SEL[i]];if(!b)continue;
    var col=i===0?"#ff6b35":(i===SEL.length-1?"#7c3aed":"#fe3939");
    var name=b.participants[0]||b.id;
    var sub=b.participants.slice(1,3).join(" / ");
    h+="<div class=\"rcard\" data-action=\"moveup\" data-idx=\""+i+"\">";
    h+="<div class=\"rord\" style=\"background:"+col+"\">"+(i+1)+"</div>";
    h+="<div class=\"rbody\"><div class=\"rnum\">"+SEL[i]+"</div><div class=\"rname\">"+name+"</div>";
    if(sub)h+="<div class=\"rsub\">"+sub+"</div>";
    h+="</div><div class=\"rdel\" data-action=\"rem\" data-id=\""+SEL[i]+"\">\u2715</div></div>";
  }
  h+="</div><div class=\"ract\">";
  h+="<button class=\"rbtn rbtn-g\" data-action=\"clearall\">\uC804\uCCB4 \uCD08\uAE30\uD654</button>";
  h+="<button class=\"rbtn rbtn-p\" data-action=\"savedone\">\uC800\uC7A5\uD558\uAE30</button>";
  h+="</div>"+renderSaved();
  rv.innerHTML=h;
  setTimeout(function(){renderRouteMap();},50);
}

/* ── SAVED ROUTES ── */
function saveRoute(){
  if(!SEL.length){toast("\uC120\uD0DD\uB41C \uBD80\uC2A4\uAC00 \uC5C6\uC2B5\uB2C8\uB2E4");return;}
  var name="\uB3D9\uC120 "+(savedRoutes.length+1)+" \u2013 "+SEL.length+"\uAC1C \uBD80\uC2A4";
  savedRoutes.unshift({name:name,sel:SEL.slice()});
  if(savedRoutes.length>10)savedRoutes.pop();
  toast("\uC800\uC7A5\uB428: "+name);
  renderRoute();
}
function loadRoute(idx){
  var r=savedRoutes[idx];if(!r)return;
  SEL.length=0;for(var i=0;i<r.sel.length;i++)SEL.push(r.sel[i]);
  OG=null;upd();renderMap();renderFacet();renderRoute();
  toast(r.name+" \uBD88\uB7EC\uC634");
}
function deleteSaved(idx){
  savedRoutes.splice(idx,1);renderRoute();toast("\uC0AD\uC81C\uB428");
}
function renderSaved(){
  if(!savedRoutes.length)return "";
  var h="<div class=\"saved-wrap\"><div class=\"saved-hd\">\uC800\uC7A5\uB41C \uB3D9\uC120 <span>"+savedRoutes.length+"/10</span></div>";
  for(var i=0;i<savedRoutes.length;i++){
    h+="<div class=\"saved-item\">";
    h+="<button class=\"saved-name\" data-action=\"loadroute\" data-idx=\""+i+"\">"+savedRoutes[i].name+"</button>";
    h+="<button class=\"saved-del\" data-action=\"delsaved\" data-idx=\""+i+"\">\u2715</button>";
    h+="</div>";
  }
  return h+"</div>";
}

/* ── EVENTS ── */
document.addEventListener("click",function(e){
  var el=e.target;
  while(el&&el!==document.body){
    if(el.dataset){
      var a=el.dataset.action,id=el.dataset.id,idx=el.dataset.idx,part=el.dataset.part,hall=el.dataset.hall;
      if(a==="togglepart"){togglePart(part);return;}
      if(a==="hallfilter"){onHallFilter(hall||"");return;}
      if(a==="moveup"){moveUp(parseInt(idx));return;}
      if(a==="rem"){doRem(id);return;}
      if(a==="clearall"){clearAll();return;}
      if(a==="savedone"){saveRoute();return;}
      if(a==="loadroute"){loadRoute(parseInt(idx));return;}
      if(a==="delsaved"){deleteSaved(parseInt(idx));return;}
    }
    el=el.parentElement;
  }
});

/* ── HELPERS ── */
function doRem(id){
  var i=SEL.indexOf(id);if(i>-1)SEL.splice(i,1);
  OG=null;renderMap();upd();renderFacet();
  if(document.getElementById("v-route").classList.contains("on"))renderRoute();
  toast((BMAP[id]&&BMAP[id].participants[0]||id).slice(0,14)+" \uC81C\uAC70\uB428");
}
function moveUp(i){
  if(i===0){toast("\uC774\uBBF8 \uCCAB \uBC88\uC9F8");return;}
  var tmp=SEL[i-1];SEL[i-1]=SEL[i];SEL[i]=tmp;
  OG=null;renderMap();renderRoute();toast("\uC21C\uC11C \uBCC0\uACBD\uB428");
}
function clearAll(){SEL.length=0;OG=null;renderMap();upd();renderFacet();renderRoute();toast("\uCD08\uAE30\uD654\uB428");}
function upd(){
  document.getElementById("cnt").textContent=SEL.length;
  document.getElementById("bgo").disabled=SEL.length===0;
}
function goTab(t,el){
  var tabs=document.querySelectorAll(".tab"),i;
  for(i=0;i<tabs.length;i++)tabs[i].classList.remove("on");
  el.classList.add("on");
  var views=document.querySelectorAll(".view");
  for(i=0;i<views.length;i++)views[i].classList.remove("on");
  document.getElementById("v-"+t).classList.add("on");
  if(t==="route")renderRoute();
  if(t==="map")renderFacet();
}
function toast(m){
  var t=document.getElementById("toast");
  t.textContent=m;t.classList.add("on");
  clearTimeout(t._t);t._t=setTimeout(function(){t.classList.remove("on");},2000);
}

/* ── INIT ── */
renderMap();
renderFacet();
setTimeout(function(){initPanZoom();fitMap();},100);

</script>
